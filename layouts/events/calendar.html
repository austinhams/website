{{ define "main" }}
<section class="max-w-6xl mx-auto px-4 py-10">
  <header class="mb-6">
    <h1 class="text-3xl md:text-4xl font-bold text-gray-900">{{ .Title }}</h1>
    {{ with .Content }}<div class="prose mt-3 max-w-none">{{ . }}</div>{{ end }}
  </header>

  <div id="aarc-calendar" class="bg-white border border-gray-200 rounded-lg p-2 md:p-4 shadow-sm"></div>
  <p id="aarc-calendar-error" class="hidden mt-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-md p-3"></p>
</section>

<script src="https://cdn.jsdelivr.net/npm/ical.js@1.4.0/build/ical.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.15/index.global.min.js"></script>
<style>
  #aarc-calendar { min-height: 640px; }
  .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 600; }
  .fc .fc-button-primary {
    background-color: #1d4ed8; border-color: #1d4ed8;
  }
  .fc .fc-button-primary:not(:disabled):hover {
    background-color: #1e40af; border-color: #1e40af;
  }
  .fc .fc-button-primary:not(:disabled).fc-button-active {
    background-color: #1e3a8a; border-color: #1e3a8a;
  }
  .fc-event { cursor: pointer; }
</style>
<script>
  (function () {
    var el = document.getElementById('aarc-calendar');
    var errEl = document.getElementById('aarc-calendar-error');
    if (!el || typeof FullCalendar === 'undefined') return;

    var icsUrl = {{ .Params.ics_url | jsonify }};

    var calendar = new FullCalendar.Calendar(el, {
      initialView: window.matchMedia('(max-width: 640px)').matches ? 'listMonth' : 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,listMonth'
      },
      height: 'auto',
      nowIndicator: true,
      eventTimeFormat: { hour: 'numeric', minute: '2-digit', meridiem: 'short' },
      events: {
        url: icsUrl,
        format: 'ics',
        failure: function (err) {
          errEl.textContent = 'Could not load calendar feed: ' + (err && err.message ? err.message : 'unknown error');
          errEl.classList.remove('hidden');
        }
      },
      eventClick: function (info) {
        if (info.event.url) {
          window.open(info.event.url, '_blank');
          info.jsEvent.preventDefault();
        }
      }
    });
    calendar.render();
  })();
</script>
{{ end }}
