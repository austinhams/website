baseURL: "https://austinhams.org/"
locale: "en-us"
title: "Austin Amateur Radio Club"
enableRobotsTXT: true
enableEmoji: false

# Preserve WordPress URL structure
permalinks:
  posts: "/:slug/"

taxonomies:
  category: categories
  tag: tags

pagination:
  pagerSize: 20

params:
  description: "The oldest ham radio club in the United States — Austin, Texas."
  mailingAddress: "PO Box 4739, Austin, Texas 78765"
  social:
    facebook: "https://www.facebook.com/TheAustinAmateurRadioClub/"
    linkedin: "https://www.linkedin.com/company/austinhams"
    groupsio: "https://austinhams.groups.io/g/main"

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 4

outputs:
  home: ["HTML", "RSS"]
  section: ["HTML", "RSS"]

