- title: "Have fun"
  body: "Amateur radio should be fun &mdash; and it's social. By participating in club events you'll meet other hams who share your passion."
- title: "Mentoring"
  body: "Need help learning a new mode or stuck on a project? Tap into a community of experienced operators ready to lend a hand."
- title: "Elmering"
  body: "Ready to upgrade your license, or have friends who want to get licensed? Our members love helping new hams get on the air."
- title: "Equipment Loaner Program"
  body: "AARC has radios and test equipment that members can borrow &mdash; perfect for trying out a new mode or troubleshooting a problem."
- title: "Help with installations"
  body: "The club is a great source of expertise, opinions, and elbow grease for your next antenna or shack install."
- title: "Public Service"
  body: "A member of another service organization that needs communications support? AARC can likely help &mdash; we love supporting community events."
- title: "Socializing"
  body: "Ham radio is what geeks did before computers &mdash; and there are many brilliant people in our community. A great way to meet folks who share your interests."
- title: "Education"
  body: "A plethora of educational and instructional resources are available to ARRL members, both in print and on their website."
- title: "Information"
  body: "The club shares information and promotes discussion via on-air activity, our <a href=\"https://groups.io/g/AUSTINHAMS\" class=\"text-blue-700 underline hover:text-blue-900\">Groups.io list</a>, and our own mailing list."
- title: "Legislation"
  body: "AARC and ARRL monitor legislator actions at local, state, and federal levels &mdash; protecting against unneeded regulations and preserving our frequency allocations."
